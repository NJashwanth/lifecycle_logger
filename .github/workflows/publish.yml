name: Publish to pub.dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          set -euo pipefail
          name=$(awk '/^name:/ { print $2; exit }' pubspec.yaml)
          version=$(awk '/^version:/ { print $2; exit }' pubspec.yaml)
          if [[ -z "$name" || -z "$version" ]]; then
            echo "Could not read name/version from pubspec.yaml"
            exit 1
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether version already exists on pub.dev
        id: version_check
        shell: bash
        run: |
          set -euo pipefail
          name='${{ steps.package.outputs.name }}'
          version='${{ steps.package.outputs.version }}'
          if curl -fsS "https://pub.dev/api/packages/$name/versions/$version" >/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $version is already published for $name. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version $version is not on pub.dev yet. Proceeding."
          fi

      - name: Publish package
        if: ${{ steps.version_check.outputs.already_published == 'false' }}
        run: dart pub publish --force
